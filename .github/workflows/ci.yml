name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check PHP syntax (lint)
        run: find src tests -name "*.php" -print0 | xargs -0 php -l

      - name: Check code format
        run: vendor/bin/php-cs-fixer fix --dry-run --diff src

  docs-link-check:
    name: Docs Link Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build site
        run: bun x astro build

      - name: Serve docs locally
        run: |
          bun astro preview --port 4330 &
          HOST_IP=$(ip addr show docker0 | awk '/inet / {print $2}' | cut -d/ -f1)
          echo "DOCS_URL=http://${HOST_IP}:4330/redisearch-php/" >> $GITHUB_ENV

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf $DOCS_URL > /dev/null && echo "Server ready" && exit 0
            sleep 1
          done
          echo "Server did not start in time" && exit 1

      - name: Check links
        uses: ethanhann/spidermedic@main
        with:
          url: '${{ env.DOCS_URL }}'
          path: '/redisearch-php/'

  test:
    name: Test (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    needs: lint-and-format
    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3', '8.4', '8.5']

    services:
      redis:
        image: redis/redis-stack-server:latest
        ports:
          - 6381:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php-version }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php-version }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
